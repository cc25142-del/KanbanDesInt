<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadro de Tarefas</title>
    <link rel="stylesheet" href="kanban.css">
</head>

<body>  

    <header>
        <h1>Quadro de Tarefas</h1>
    </header>

    <form id="formtaf">
        <input type="text" id="titulo" placeholder="Nova Tarefa">

        <select id="prioridade">
            <option value="alta">Alta</option>
            <option value="media">Média</option>
            <option value="baixa">Baixa</option>
        </select>

        <button type="submit">Adicionar</button>
        <button type="button" onclick="fecharForm('fecharForm')">✕</button>
    </form>

    <div class="kanban">

        <div class="colunas">

            <div id="faixaazul">
                <h2>A Fazer</h2>
            </div>

            <div id="afazer" class="area-cards"></div>

            <button class="btn-mais" onclick="abrirFormulario()">
                +
            </button>

        </div>

        <div class="colunas">

            <div id="faixaamarela">
                <h2>Em Progresso</h2>
            </div>

            <div id="progresso" class="area-cards"></div>

            <button class="btn-mais" onclick="abrirFormulario()">
                +
            </button>

        </div>

        <div class="colunas">

            <div id="faixaverde">
                <h2>Concluído</h2>
            </div>

            <div id="concluido" class="area-cards"></div>

            <button class="btn-mais" onclick="abrirFormulario()">
                +
            </button>

        </div>

    </div>

<script src="kanban2.js"></script>

</body>

</html>
